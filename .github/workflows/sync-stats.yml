name: Sync Stats
on:
  workflow_dispatch: {}
  workflow_call: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: cd scripts && npm ci
      - env: { AMO_TOKEN: '${{ secrets.AMO_TOKEN }}' }
        run: |
          cd scripts
          node stats-sync.js
          node interns-sync.js
      - uses: actions/upload-artifact@v4
        with: { name: stats-data, path: docs/data/sheets/statisti*.json }
      - name: Direct push (standalone run)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --cached --quiet && exit 0
          git commit -m "sync stats: $(date -u +%H:%M)"
          for i in 1 2 3; do
            git pull --rebase origin master --autostash && git push origin master && exit 0
            echo "Retry $i..."
            sleep 5
          done
          echo "Force push..."
          git push origin master --force
