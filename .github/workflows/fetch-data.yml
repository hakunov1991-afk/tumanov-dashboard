name: Sync All

on:
  schedule:
    - cron: '7 19 * * *'
  workflow_dispatch: {}

concurrency:
  group: sync-all
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  tasks:
    uses: ./.github/workflows/sync-tasks.yml
    secrets: inherit
  rating:
    uses: ./.github/workflows/sync-rating.yml
    secrets: inherit
  cohort:
    uses: ./.github/workflows/sync-cohort.yml
    secrets: inherit
  stats:
    uses: ./.github/workflows/sync-stats.yml
    secrets: inherit

  commit:
    needs: [tasks, rating, cohort, stats]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: docs/data/, merge-multiple: true }
      - name: Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "sync: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase origin master || true
          git push origin master
