name: Sync AMO Data

on:
  schedule:
    - cron: '7 19 * * *'    # 02:07 Phuket (T1+T2+T3+T4+T5+T7+T11)
    - cron: '37 20 * * *'   # 03:37 Phuket (Circles+Schedule+BT+T8+T9+T10)
  workflow_dispatch: {}      # Manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm ci

      - name: Run tasks-sync
        env:
          AMO_TOKEN: ${{ secrets.AMO_TOKEN }}
        run: cd scripts && node tasks-sync.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync: update dashboard data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
