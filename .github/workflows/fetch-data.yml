name: Sync AMO Data

on:
  schedule:
    - cron: '7 19 * * *'    # 02:07 Phuket — tasks
    - cron: '47 19 * * *'   # 02:47 Phuket — rating + cohort
  workflow_dispatch: {}      # Manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: cd scripts && npm ci

      - name: Run tasks-sync
        env:
          AMO_TOKEN: ${{ secrets.AMO_TOKEN }}
        run: cd scripts && node tasks-sync.js

      - name: Run rating-sync
        env:
          AMO_TOKEN: ${{ secrets.AMO_TOKEN }}
        run: cd scripts && node rating-sync.js

      - name: Run cohort-sync
        env:
          AMO_TOKEN: ${{ secrets.AMO_TOKEN }}
        run: cd scripts && node cohort-sync.js

      - name: Run stats-sync
        env:
          AMO_TOKEN: ${{ secrets.AMO_TOKEN }}
        run: cd scripts && node stats-sync.js

      - name: Run interns-sync
        env:
          AMO_TOKEN: ${{ secrets.AMO_TOKEN }}
        run: cd scripts && node interns-sync.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync: update dashboard data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            # Retry push with rebase on conflict (handles concurrent workflow runs)
            for i in 1 2 3; do
              if git push; then
                break
              fi
              echo "Push failed, pulling and retrying (attempt $i)..."
              git pull --rebase origin master
              sleep 2
            done
          fi
