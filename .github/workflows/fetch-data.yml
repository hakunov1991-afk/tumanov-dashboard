name: Sync All

on:
  schedule:
    - cron: '7 19 * * *'
  workflow_dispatch: {}

concurrency:
  group: sync-amo
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: cd scripts && npm ci

      - name: tasks-sync
        env: { AMO_TOKEN: '${{ secrets.AMO_TOKEN }}' }
        run: cd scripts && node tasks-sync.js

      - name: rating-sync
        env: { AMO_TOKEN: '${{ secrets.AMO_TOKEN }}' }
        run: cd scripts && node rating-sync.js

      - name: cohort-sync
        env: { AMO_TOKEN: '${{ secrets.AMO_TOKEN }}' }
        run: cd scripts && node cohort-sync.js

      - name: stats-sync
        env: { AMO_TOKEN: '${{ secrets.AMO_TOKEN }}' }
        run: cd scripts && node stats-sync.js

      - name: interns-sync
        env: { AMO_TOKEN: '${{ secrets.AMO_TOKEN }}' }
        run: cd scripts && node interns-sync.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "sync: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase origin master || true
          git push origin master
